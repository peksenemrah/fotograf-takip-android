name: Android APK Oluştur

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle kurulumu
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Uygulama ikonlarını oluştur (PNG - eski Android için)
        run: |
          sudo apt-get install -y imagemagick -q

          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # 512x512 temel ikon oluştur (mavi arka plan + kamera)
          convert -size 512x512 xc:'#2563eb' \
            -fill white -draw "roundrectangle 80,130 432,390 12,12" \
            -fill white -draw "polygon 170,130 210,80 302,80 342,130" \
            -fill '#1d4ed8' -draw "circle 256,260 256,170" \
            -fill '#3b82f6' -draw "circle 256,260 256,195" \
            -fill '#60a5fa' -draw "circle 256,260 256,220" \
            -fill white -fillalpha 0.3 -draw "circle 230,234 240,220" \
            /tmp/icon_base.png 2>/dev/null

          # Her yoğunluk için boyutlandır
          convert /tmp/icon_base.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/icon_base.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon_base.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon_base.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon_base.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # Yuvarlak ikon versiyonu
          convert /tmp/icon_base.png -resize 48x48   \
            \( +clone -alpha extract -draw 'fill black polygon 0,0 0,48 48,0 fill white circle 24,24 24,0' \
               \( +clone -flip \) -compose Multiply -composite \
               \( +clone -flop \) -compose Multiply -composite \) \
            -alpha off -compose CopyOpacity -composite \
            app/src/main/res/mipmap-mdpi/ic_launcher_round.png 2>/dev/null || \
            cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          for density in hdpi xhdpi xxhdpi xxxhdpi; do
            cp app/src/main/res/mipmap-${density}/ic_launcher.png \
               app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

          echo "İkonlar oluşturuldu ✓"

      - name: APK oluştur (debug - kurulum için yeterli)
        run: gradle :app:assembleDebug

      - name: APK dosyasını yeniden adlandır
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk \
             output/FotografAlbumuTakip-v1.${{ github.run_number }}.apk

      - name: APK'yı artifacts olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: FotografTakip-APK
          path: output/*.apk
          retention-days: 90

      - name: GitHub Release oluştur ve APK ekle
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}
          name: "Fotoğraf Albümü Takip v1.${{ github.run_number }}"
          body: |
            ## 📸 Fotoğraf Albümü Ödeme Takibi

            ### 📥 APK Kurulum Talimatları

            1. Aşağıdaki **Assets** bölümünden `FotografAlbumuTakip-*.apk` dosyasını indir
            2. Dosyayı Android telefonuna aktar (USB, WhatsApp, Drive vb.)
            3. Telefonda dosyaya dokun
            4. **"Bilinmeyen kaynaklardan yüklemeye izin ver"** seçeneğini onayla
            5. Kurulumu tamamla → Uygulama açılır

            ### ✅ Özellikler
            - 30 sınıf için öğrenci listesi
            - Toplu öğrenci ekleme (yapıştır)
            - Tarihli ödeme takibi
            - Mali raporlar ve CSV export
            - Veriler telefonda kalıcı olarak saklanır
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
