name: Android APK Oluştur

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle kurulumu
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Uygulama ikonlarını oluştur (Python ile PNG)
        run: |
          python3 - <<'EOF'
          import struct, zlib, os

          def make_png(path, size, bg=(37, 99, 235)):
              """Tek renk PNG oluştur"""
              os.makedirs(os.path.dirname(path), exist_ok=True)
              r, g, b = bg
              raw = b''
              for _ in range(size):
                  raw += b'\x00' + bytes([r, g, b] * size)

              def chunk(tag, data):
                  c = tag + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              with open(path, 'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n')
                  f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)))
                  f.write(chunk(b'IDAT', zlib.compress(raw, 9)))
                  f.write(chunk(b'IEND', b''))

          base = 'app/src/main/res'
          sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }
          for density, size in sizes.items():
              make_png(f'{base}/{density}/ic_launcher.png', size)
              make_png(f'{base}/{density}/ic_launcher_round.png', size)

          print('İkonlar oluşturuldu ✓')
          EOF

      - name: APK oluştur
        run: gradle :app:assembleDebug

      - name: APK dosyasını yeniden adlandır
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk \
             "output/FotografAlbumuTakip-v1.${{ github.run_number }}.apk"

      - name: APK'yı artifacts olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: FotografTakip-APK
          path: output/*.apk
          retention-days: 90

      - name: GitHub Release oluştur ve APK ekle
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}
          name: "Fotoğraf Albümü Takip v1.${{ github.run_number }}"
          body: |
            ## Fotoğraf Albümü Ödeme Takibi

            ### APK Kurulum Talimatları

            1. Aşağıdaki **Assets** bölümünden `FotografAlbumuTakip-*.apk` dosyasını indir
            2. Dosyayı Android telefonuna aktar (USB, WhatsApp, Drive vb.)
            3. Telefonda dosyaya dokun
            4. "Bilinmeyen kaynaklardan yüklemeye izin ver" seçeneğini onayla
            5. Kurulumu tamamla ve uygulamayı aç

            ### Özellikler
            - 30 sınıf için öğrenci listesi yönetimi
            - Toplu öğrenci ekleme (yapıştır)
            - Tarihli ödeme takibi
            - Mali raporlar ve CSV export
            - Veriler telefonda kalıcı olarak saklanır
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
